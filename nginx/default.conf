server {
    listen 80;
    server_name localhost;

    # Корень для статики Symfony (важно для работы try_files)
    root /var/www/symfony/public;

    # 1. ВИРТУАЛЬНЫЕ ПУТИ SYMFONY (Profiler и Debug Toolbar)
    # Эти пути НЕ существуют на диске, их должен обрабатывать PHP
    location ~ ^/(_profiler|_wdt) {
        try_files $uri /index.php$is_args$args;
    }

    # 2. СТАТИКА BACKEND (Физические файлы)
    # Картинки, JS, CSS от админки (EasyAdmin) или ассет-маппера
    location ~ ^/(bundles|assets) {
        try_files $uri =404;
        access_log off;
        expires max;
    }

    # 3. BACKEND API & ADMIN
    # Используем ^~ для приоритета перед Nuxt
    location ^~ /api {
        try_files $uri /index.php$is_args$args;
    }

    location ^~ /admin {
        try_files $uri /index.php$is_args$args;
    }

    # 4. ОБРАБОТКА PHP (Symfony)
    location ~ ^/index\.php(/|$) {
        fastcgi_pass backend:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Передаем информацию о прокси, чтобы Symfony корректно строила ссылки
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;

        internal;
    }

    # 5. FRONTEND (NUXT)
    # Всё, что не попало в правила выше, уходит на Nuxt
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}